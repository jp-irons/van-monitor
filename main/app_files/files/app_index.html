<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 App</title>
  <link rel="stylesheet" href="/app/ui/styles.css">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen relative">

  <div class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded-lg overflow-visible">

    <nav class="emb-nav">
      <span class="emb-nav-title">ESP32 App</span>
      <div class="emb-nav-actions">
        <div class="emb-nav-menu">
          <button id="nav-settings-btn" class="emb-nav-btn"
                  aria-haspopup="true" aria-expanded="false">
            Settings
          </button>
          <ul id="nav-settings-dropdown" class="emb-nav-dropdown hidden" role="menu">
            <li><a href="/framework/ui/index.html#wifi"     class="emb-nav-item" role="menuitem">Wi-Fi</a></li>
            <li><a href="/framework/ui/index.html#firmware" class="emb-nav-item" role="menuitem">Firmware</a></li>
            <li><a href="/framework/ui/index.html#device"   class="emb-nav-item" role="menuitem">Device</a></li>
            <li><a href="/framework/ui/index.html#security" class="emb-nav-item" role="menuitem">Security</a></li>
            <li class="emb-nav-divider"></li>
            <li><a href="/framework/ui/index.html" class="emb-nav-item" role="menuitem">About</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <h2 class="app-card-title">Device Temperature</h2>
    <div class="app-temp-display">
      <span id="temp-value" class="app-temp-value">—</span>
      <span class="app-temp-unit">°C</span>
    </div>
    <p id="temp-status" class="app-temp-status">Loading…</p>
    <button id="refresh-btn" class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700" onclick="app.refresh()">Refresh</button>

  </div>

  <script src="/app/ui/app.js"></script>

</body>
</html>
